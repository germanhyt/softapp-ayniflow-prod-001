services:
  mysql:
    image: mysql:8.4
    container_name: germanhyt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-germanhyt}
      MYSQL_USER: ${MYSQL_USER:-germanhyt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-germanhyt}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
